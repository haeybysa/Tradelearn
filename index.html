<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeLearn — Обучение трейдингу с нуля</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--hover:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#3b82f6;--accentL:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;--border:#334155}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:24px;font-weight:800;background:linear-gradient(90deg,var(--accentL),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:8px}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;transition:.3s}
.nav-tab:hover{color:var(--text);background:var(--hover)}
.nav-tab.active{color:var(--text);background:var(--accent)}
.portfolio-mini{display:flex;gap:16px;align-items:center;font-size:13px}
.portfolio-mini span{color:var(--muted)}.portfolio-mini .amount{color:var(--green);font-weight:700;font-size:16px}
.main-container{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 70px)}
.sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);padding:20px;overflow-y:auto;max-height:calc(100vh - 70px);position:sticky;top:70px}
.sidebar-title{font-size:12px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;letter-spacing:1px}
.lesson-item{padding:12px 14px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px;font-size:13px}
.lesson-item:hover{background:var(--hover)}
.lesson-item.active{background:var(--accent);color:#fff}
.lesson-item.completed{opacity:.6}.lesson-item.completed::before{content:"✓";color:var(--green);font-weight:bold;margin-right:4px}
.lesson-item.locked{opacity:.4;cursor:not-allowed}.lesson-item.locked::before{content:"🔒";margin-right:4px}
.lesson-num{width:24px;height:24px;border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lesson-item.active .lesson-num{background:rgba(255,255,255,.2)}
.content{flex:1;padding:30px;overflow-y:auto}
.section{display:none}.section.active{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px;border:1px solid var(--border)}
.card-title{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.card-subtitle{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.6}
.progress-bar{width:100%;height:8px;background:var(--hover);border-radius:4px;overflow:hidden;margin:16px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accentL));border-radius:4px;transition:width .5s ease}
.btn{padding:12px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accentL);transform:translateY(-1px)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--red);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--hover)}
.chart-container{background:var(--bg);border-radius:12px;padding:20px;margin:20px 0;position:relative;height:350px}
#simChart{width:100%;height:280px}
.chart-info{display:flex;justify-content:space-between;margin-top:12px;font-size:13px;flex-wrap:wrap;gap:8px}
.chart-info span{color:var(--muted)}.chart-info .value{color:var(--text);font-weight:600}
.trading-panel{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.trade-form{display:flex;flex-direction:column;gap:12px}
.form-group label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.form-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border-color .3s}
.form-input:focus{border-color:var(--accent)}
.trade-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.btn-buy{background:var(--green);color:#fff;padding:14px;font-size:16px;border:none;border-radius:10px;cursor:pointer;font-weight:600}
.btn-buy:hover{background:#16a34a}.btn-sell{background:var(--red);color:#fff;padding:14px;font-size:16px;border:none;border-radius:10px;cursor:pointer;font-weight:600}
.btn-sell:hover{background:#dc2626}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:16px}
.portfolio-stat{background:var(--bg);border-radius:12px;padding:16px;text-align:center}
.portfolio-stat .label{font-size:12px;color:var(--muted);margin-bottom:6px}
.portfolio-stat .value{font-size:22px;font-weight:700}
.portfolio-stat .change{font-size:12px;margin-top:4px}
.quiz-option{padding:14px 18px;border-radius:10px;border:1px solid var(--border);background:var(--bg);margin-bottom:10px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px}
.quiz-option:hover{border-color:var(--accent);background:var(--hover)}
.quiz-option.correct{border-color:var(--green);background:rgba(34,197,94,.1)}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.1)}
.quiz-letter{width:28px;height:28px;border-radius:50%;background:var(--hover);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
.data-table td{padding:12px;border-bottom:1px solid var(--border)}
.data-table tr:hover td{background:var(--hover)}
.tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tag-green{background:rgba(34,197,94,.15);color:var(--green)}.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.tag-blue{background:rgba(59,130,246,.15);color:var(--accentL)}
.tooltip{cursor:help;border-bottom:1px dotted var(--muted)}
@media(max-width:900px){.sidebar{display:none}.trading-panel{grid-template-columns:1fr}.portfolio-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="header">
<div class="logo">📈 TradeLearn</div>
<nav class="nav-tabs">
<button class="nav-tab active" onclick="showTab('learn')">📚 Обучение</button>
<button class="nav-tab" onclick="showTab('simulator')">🎮 Симулятор</button>
<button class="nav-tab" onclick="showTab('portfolio')">💼 Портфель</button>
<button class="nav-tab" onclick="showTab('history')">📊 История</button>
</nav>
<div class="portfolio-mini">
<span>Баланс:</span>
<span class="amount" id="headerBalance">100 000 ₽</span>
</div>
</header>

<div class="main-container">
<aside class="sidebar" id="sidebar">
<div class="sidebar-title">Курс: Трейдинг с нуля</div>
<div id="lessonList"></div>
<div style="margin-top:30px">
<div class="sidebar-title">Ваш прогресс</div>
<div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
<div style="font-size:12px;color:var(--muted);margin-top:6px"><span id="progressText">0/8 уроков</span></div>
</div>
</aside>

<main class="content" id="mainContent">
<!-- Learning -->
<div class="section active" id="learnSection">
<div class="card">
<div class="card-title" id="lessonTitle">🎯 Урок 1: Что такое акции?</div>
<div class="card-subtitle" id="lessonContent">Загрузка...</div>
<div id="lessonQuiz"></div>
<div style="margin-top:24px;display:flex;gap:12px">
